server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Serve the Wasm binary with the correct MIME type
    # (browsers reject Wasm with the wrong Content-Type)
    location ~* \.wasm$ {
        add_header Content-Type application/wasm;
    }

    # SPA fallback — any unmatched route serves index.html
    # so client-side navigation doesn't 404 on reload
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively, JS/Wasm versioned by filename hash
    location ~* \.(js|wasm|css|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
